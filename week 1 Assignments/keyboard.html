<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <style>
        *{
            margin: auto;
        }

        h1 {
            text-align: center;
            background-color: blue;

        }

        .cont {
            border: 5px solid black;
            height: 350px;
            width: 886px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1px;
            padding: 20px;
        }

        .cont>div {
            border: 1px solid black;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            border-radius: 5px;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
            transition: transform 0.2s ease;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .twospace {
            grid-column: 11/13;
            font-size: 18px;
            font-weight: bold;
            color: rgb(19, 85, 90);
        }

        .space {
            grid-column: 5/9;
            font-size: 18px;
            font-weight: bold;
            color: rgb(19, 85, 90);
        }

        .cont>div:hover {
            background-color: rgb(241, 245, 246);
            transform: scale(0.95);
            cursor: pointer;
            background-color: blue;
        }
    </style>
</head>

<body>
   <h1>Calculator Keyboard</h1>
    <div class="cont">
         
        <div>~</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>0</div>
        <div>delete</div>
        <div>tab</div>
        <div>Q</div>
        <div>W</div>
        <div>E</div>
        <div>R</div>
        <div>T</div>
        <div>Y</div>
        <div>U</div>
        <div>I</div>
        <div>O</div>
        <div>P</div>
        <div>\</div>
        <div>Caps</div>
        <div>A</div>
        <div>S</div>
        <div>D</div>
        <div>F</div>
        <div>G</div>
        <div>H</div>
        <div>J</div>
        <div>K</div>
        <div>L</div>
        <div class="twospace">Enter</div>
        <div>Shift</div>
        <div>Z</div>
        <div>X</div>
        <div>C</div>
        <div>V</div>
        <div>B</div>
        <div>N</div>
        <div>M</div>
        <div>&lt;</div>
        <div>&gt;</div>
        <div class="twospace">Shift</div>
        <div>Windows</div>
        <div>ctrl</div>
        <div>options</div>
        <div>Alt</div>
        <div class="space">Space</div>
        <div>alt</div>
        <div>options</div>
        <div>&lt;</div>
        <div>&gt;</div>
    </div>
</body>

</html>
