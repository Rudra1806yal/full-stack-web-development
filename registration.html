<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Registration</title>
    <link rel="shortcut icon"
        href= "https://www.google.com/imgres?q=dummy%20favicon%20writingicon&imgurl=https%3A%2F%2Fstatic.vecteezy.com%2Fsystem%2Fresources%2Fthumbnails%2F050%2F556%2F044%2Fsmall_2x%2Farticle-writing-icon-design-vector.jpg&imgrefurl=https%3A%2F%2Fwww.vecteezy.com%2Fvector-art%2F50556044-article-writing-icon-design&docid=wb9qvAQjZE_KbM&tbnid=JN6ogK-OQolgWM&vet=12ahUKEwiY1emzjPiUAxXozTQHHYVDN54QnPAOegQIFhAB..i&w=700&h=700&hcb=2&ved=2ahUKEwiY1emzjPiUAxXozTQHHYVDN54QnPAOegQIFhAB.ico"
        type="image/x-icon">
</head>

<body>
    <center>
        <h1>College Event Registration</h1>
    </center>
    <hr>

    <br><br>

    <form action="">
    <label for="name">Your Name: </label>
    <input type="text" name="name" id="name" placeholder="Enter your name" required>
    <br><br>

    <label for="email">Email: </label>
    <input type="text" name="email" id="email" placeholder="Enter your email" required>
    <br><br>

    <label for="category">Select for Category:</label><br>
    <input type="radio" name="category" id="category">
    <label>Coding Hackathon</label>
    <link rel="shortcut icon"
        href="https://www.google.com/imgres?q=dummy%20favicon%20laptop%20icon&imgurl=https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F432%2F432787.png&imgrefurl=https%3A%2F%2Fwww.flaticon.com%2Ffree-icon%2Flaptop_432787&docid=ZDe84Jdm6DemhM&tbnid=UXyT8tE2AQ8TtM&vet=12ahUKEwj0hMfrifiUAxUtzDgGHVILAbkQnPAOegQIHBAB..i&w=512&h=512&hcb=2&ved=2ahUKEwj0hMfrifiUAxUtzDgGHVILAbkQnPAOegQIHBAB.ico"
        type="image/x-icon">
    <br><br>

    <input type="radio" name="category" id="category">
    <label>Debate Competition</label>
    <link rel="shortcut icon"
        href="https://www.google.com/imgres?q=dummy%20favicon%20debate%20icon&imgurl=https%3A%2F%2Fimg.icons8.com%2Fexternal-flaticons-lineal-color-flat-icons%2F1200%2Fexternal-debate-politics-flaticons-lineal-color-flat-icons.jpg&imgrefurl=https%3A%2F%2Ficons8.com%2Ficon%2FUD2ShPLv79Fu%2Fdebate&docid=v-0yj5ymYylz7M&tbnid=Gwn2XRsYVNqjlM&vet=12ahUKEwjC9tHJiviUAxXmwjgGHYIfECEQnPAOegQIGxAB..i&w=1200&h=1200&hcb=2&ved=2ahUKEwjC9tHJiviUAxXmwjgGHYIfECEQnPAOegQIGxAB.ico"
        type="image/x-icon">
    <br><br>

    <input type="radio" name="category" id="category">
    <label>Sports Tournament</label>
    <link rel="shortcut icon"
        href="https://www.google.com/imgres?q=dummy%20favicon%20sports%20icon&imgurl=https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F3022%2F3022551.png&imgrefurl=https%3A%2F%2Fwww.flaticon.com%2Ffree-icon%2Ffootball_3022551&docid=aWkWnBIlQPIsIM&tbnid=wwAelnNF9NpbCM&vet=12ahUKEwitvfiMiviUAxXJ8jgGHQqqJCkQnPAOegQIGRAB..i&w=512&h=512&hcb=2&ved=2ahUKEwitvfiMiviUAxXJ8jgGHQqqJCkQnPAOegQIGRAB.ico"
        type="image/x-icon">
    <br><br>

    <label for="date">Event Date: </label>
    <input type="date" name="date" id="date" placeholder="dd-mm-yyyy">
    <br><br>

    <label for="time">Time Slot: </label>
    <input type="time" name="time" id="time" placeholder="--:--">
    <br><br>

    <input type="submit">
    
    </form>

</body>

</html>
